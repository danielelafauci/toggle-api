spring:
  application:
    name: toggleapi
  datasource:
    url: jdbcql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    show-sql: true

  flyway:
    baseline-on-migrate: true

